name: Build geoip-ru.dat

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install v2fly/geoip tool
        run: go install github.com/v2fly/geoip@latest

      - name: Download RU IPv4 list from ipverse
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/ipverse/rir-ip/master/country/ru/ipv4-aggregated.txt" \
            -o ru-ipv4.txt
          echo "Строк в списке: $(wc -l < ru-ipv4.txt)"
          head -3 ru-ipv4.txt

      - name: Write geoip builder config
        run: |
          mkdir -p output/dat
          cat > config.json << 'CONF'
          {
            "input": [
              {
                "type": "private",
                "action": "add"
              },
              {
                "type": "text",
                "action": "add",
                "args": {
                  "name": "ru",
                  "uri": "ru-ipv4.txt",
                  "onlyIPType": "ipv4"
                }
              }
            ],
            "output": [
              {
                "type": "v2rayGeoIPDat",
                "action": "output",
                "args": {
                  "outputDir": "./output/dat",
                  "outputName": "geoip-ru.dat",
                  "wantedList": ["private", "ru"]
                }
              }
            ]
          }
          CONF

      - name: Build geoip-ru.dat
        run: |
          geoip -c config.json
          ls -lh output/dat/
          echo "Размер: $(ls -lh output/dat/geoip-ru.dat | awk '{print $5}')"

      - name: Set release tag
        id: tag
        run: echo "tag=$(date -u +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "GeoIP RU — ${{ steps.tag.outputs.tag }}"
          body: |
            Автоматическая сборка от ${{ steps.tag.outputs.tag }}.

            Содержит теги:
            - `geoip:ru` — IPv4-подсети РФ (источник: ipverse/rir-ip)
            - `geoip:private` — приватные диапазоны (RFC 1918 и др.)

            **Использование в Xray/V2Ray:**
            ```json
            { "ip": ["ext:geoip-ru.dat:private"], "outboundTag": "direct" },
            { "ip": ["ext:geoip-ru.dat:ru"],      "outboundTag": "direct" }
            ```

            **Прямая ссылка:**
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/geoip-ru.dat
            ```
          files: output/dat/geoip-ru.dat
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
